# Bağımlılıklarda bilinen güvenlik açığı (CVE) taraması.
# Her push/PR'de + haftalık (yeni açıklanan CVE'leri kod değişmeden yakalamak için).
# high/critical seviyesinde açık varsa iş başarısız olur.
name: audit

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # her Pazartesi 06:00 UTC
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    env:
      # audit sadece package-lock'a bakar; native derleme/electron indirmesi gereksiz
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Bağımlılıkları çöz (script'siz, hızlı)
        run: npm ci --ignore-scripts
      - name: Güvenlik açığı taraması — production (high/critical'de başarısız)
        # Yalnız kullanıcıya giden (production) bağımlılıkları tara: build/dev araçlarının
        # (electron-builder, eslint, concurrently…) açıkları uygulamaya PAKETLENMEZ ve yalnız
        # güvenilir yerel girdileri işler, o yüzden sürüm yayınını bloklamamalı. Kalan
        # production açıkları package.json "overrides" ile yamalı sürüme sabitlenir.
        run: npm audit --omit=dev --audit-level=high
      - name: Tam ağaç taraması — dev dahil (bilgi amaçlı, bloklamaz)
        if: always()
        run: npm audit --audit-level=high || true
