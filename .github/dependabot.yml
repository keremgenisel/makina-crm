# Bağımlılık güncellemelerini otomatik izler ve güvenlik/sürüm PR'ları açar.
# npm bağımlılıkları + GitHub Actions sürümleri haftalık taranır.
# Not: xlsx (SheetJS) npm registry'de değil, CDN tarball'ıyla pinlenmiştir;
# Dependabot onu güncelleyemez. Bunun yerine .github/workflows/xlsx-version-check.yml
# haftalık olarak pinli sürümü SheetJS latest ile kıyaslar (bkz. SECURITY-TOOLING.md).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # React ailesini DAİMA tek PR'da tut (major dâhil). Yoksa Dependabot react-dom'u
      # tek başına major'a çıkarıp react'i geride bırakabiliyor → peer uyuşmazlığı, CI kırılır
      # (PR #7 böyle oldu). Bu grup minor-and-patch'ten ÖNCE ki react patch'leri de burada toplansın.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Küçük güncellemeleri tek PR'da topla (gürültüyü azalt)
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
