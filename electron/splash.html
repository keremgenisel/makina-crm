<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, #1a0a00 0%, #2d1505 55%, #3d1c06 100%);
    border-radius: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    position: relative;
    border: 1px solid rgba(232,93,26,.25);
  }
  .glow {
    position: absolute; width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,93,26,.18) 0%, transparent 70%);
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity:.7 } 50% { transform: scale(1.15); opacity:1 } }
  .logo-box {
    background: #fff; border-radius: 14px; padding: 18px 30px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.08);
    animation: rise .8s cubic-bezier(.2,.8,.2,1);
    z-index: 1;
  }
  .logo-box img { width: 220px; display: block; }
  @keyframes rise { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  .spinner {
    width: 38px; height: 38px; border-radius: 50%;
    border: 3px solid rgba(232,93,26,.2);
    border-top-color: #e85d1a;
    animation: spin 1s linear infinite;
    z-index: 1;
  }
  @keyframes spin { to { transform: rotate(360deg) } }
  .text {
    color: #d4a584; font-family: "Segoe UI", sans-serif; font-size: 13px;
    letter-spacing: 3px; text-transform: uppercase; font-weight: 600; z-index: 1;
  }
  .text::after { content: ""; animation: dots 1.5s steps(4) infinite; }
  @keyframes dots { 0% { content: "" } 25% { content: "." } 50% { content: ".." } 75% { content: "..." } }
  .version {
    position: absolute; bottom: 18px; color: rgba(212,165,132,.45);
    font-family: "Segoe UI", sans-serif; font-size: 11px; letter-spacing: 1px;
  }
</style>
</head>
